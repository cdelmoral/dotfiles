setw -g mode-keys vi

set -g mouse on
set -g history-limit 50000

bind M choose-tree -Zw "join-pane -t '%%' -h"
bind C-m choose-tree -Zs "join-pane -t '%%' -h"
bind c new-window -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf
bind i run-shell "tmux neww -n \"cht\" cht.sh"
bind o split-window -hb -p 40 "opencode"\; last-pane
bind p display-popup -w 90% -h 90%
bind -n C-f display-popup -E "tmux-sessionizer"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'niksingh710/minimal-tmux-status'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
